<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CyberMap 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: monospace; }
    #ui {
      position: absolute; top: 20px; left: 20px;
      color: #00ff88; font-size: 14px;
    }
    #ui h1 { font-size: 18px; margin-bottom: 10px; }
    #btn-attaque {
      margin-top: 12px; padding: 8px 18px;
      background: transparent; border: 1px solid #ff4444;
      color: #ff4444; font-family: monospace; font-size: 13px;
      cursor: pointer; border-radius: 4px;
    }
    #btn-attaque:hover { background: #ff444422; }
    #legende {
      position: absolute; bottom: 20px; left: 20px;
      color: #888; font-size: 12px; line-height: 1.8;
    }
    #chargement {
      position: absolute; top: 100%; left: 0%;
      transform: translate(-50%, -50%);
      color: #00ff88; font-size: 16px; font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="chargement">⏳ attention attaque en cour...</div>
  <div id="ui" style="display:none">
    <h1>🔐 CyberMap 3D</h1>
    <div>Réseau : 4 machines</div>
    <div id="statut">Statut : ✓ Tout est sain</div>
    <button id="btn-attaque" onclick="lancerAttaque()">⚠ Lancer l'attaque</button>
  </div>
  <div id="legende" style="display:none">
    ■ Vert = Sain &nbsp;&nbsp; ■ Rouge = Infecté
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x666666));
    const lumiere = new THREE.PointLight(0xffffff, 2, 100);
    lumiere.position.set(10, 10, 10);
    scene.add(lumiere);
    const lumiere2 = new THREE.PointLight(0x4444ff, 1, 100);
    lumiere2.position.set(-10, -5, -10);
    scene.add(lumiere2);

    const machines = [
      { nom: "PC-Bureau",   type: "pc",      infecte: false, pos: [-4, 0, -4] },
      { nom: "Serveur-Web", type: "serveur", infecte: false, pos: [4, 0, -4]  },
      { nom: "Routeur",     type: "routeur", infecte: false, pos: [0, 0, 0]  },
      { nom: "PC-Portable", type: "pc",      infecte: false, pos: [0, 0, 4] },
    ];

    const modeles = {};
    const meshes = [];
    let modelesPrets = 0;

    const dracoLoader = new THREE.DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');

    const loader = new THREE.GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    function teindreMesh(objet3D, couleur) {
      objet3D.traverse(child => {
        if (child.isMesh) {
          child.material = new THREE.MeshPhongMaterial({ color: couleur });
        }
      });
    }

    function placerMachines() {
      machines.forEach(m => {
        const modele = modeles[m.type].clone();
        modele.scale.set(15, 8, 10);
        if (m.type === "pc") {
    modele.rotation.x = -Math.PI*4;
    modele.rotation.z = Math.PI*4;  // ajuste cet angle
} else if (m.type === "routeur") {
    modele.rotation.x = -Math.PI*4;
    modele.rotation.y = Math.PI;      // ajuste cet angle
} else if (m.type === "serveur") {
    modele.rotation.x = -Math.PI / 2;
}
        modele.position.set(...m.pos);
        teindreMesh(modele, 0x00ff88);
        scene.add(modele);
        meshes.push({ modele, machine: m });

        machines.forEach(cible => {
          if (m !== cible) {
            const pts = [new THREE.Vector3(...m.pos), new THREE.Vector3(...cible.pos)];
            const geo_l = new THREE.BufferGeometry().setFromPoints(pts);
            const mat_l = new THREE.LineBasicMaterial({ color: 0x223355 });
            scene.add(new THREE.Line(geo_l, mat_l));
          }
        });
      });

      document.getElementById("chargement").style.display = "none";
      document.getElementById("ui").style.display = "block";
      document.getElementById("legende").style.display = "block";
    }

    function verifierChargement() {
      modelesPrets++;
      if (modelesPrets === 3) placerMachines();
    }

    function chargerModele(nom, fichier) {
      loader.load(
        fichier,
        (gltf) => { modeles[nom] = gltf.scene; verifierChargement(); },
        undefined,
        (err) => { console.error("Erreur chargement " + fichier, err); }
      );
    }

    chargerModele("pc",      "pc.glb");
    chargerModele("serveur", "serveur.glb");
    chargerModele("routeur", "routeur.glb");

   camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

    function lancerAttaque() {
      document.getElementById("btn-attaque").disabled = true;
      document.getElementById("statut").innerText = "Statut : 🔴 Attaque en cours...";
      let i = 0;
      const intervalle = setInterval(() => {
        if (i >= meshes.length) {
          clearInterval(intervalle);
          document.getElementById("statut").innerText = "Statut : ☣ Réseau compromis !";
          return;
        }
        teindreMesh(meshes[i].modele, 0xff2222);
        i++;
      }, 1000);
    }

    function animer() {
      requestAnimationFrame(animer);
      scene.rotation.y += 0.004;
      renderer.render(scene, camera);
    }
    animer();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
